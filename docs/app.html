<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>暗号変換</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="logout-btn" class="logout-btn" type="button">ログアウト</button>
  </header>

  <main class="container">
    <!-- 上：テキスト入力ボックス -->
    <section class="field">
      <label class="field-label" id="label-top" for="box-top">テキストを入力</label>
      <textarea
        id="box-top"
        class="text-box"
        rows="10"
        spellcheck="false"
        placeholder=""
      ></textarea>
    </section>

    <!-- 上下矢印（反転・入れ替え） -->
    <div class="swap-row">
      <button
        id="swap-btn"
        class="swap-btn"
        type="button"
        title="入力方向を反転"
        aria-label="入力方向を反転"
      >
        <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true">
          <path
            d="M7 4v13M7 4L3.5 7.5M7 4l3.5 3.5M17 20V7M17 20l-3.5-3.5M17 20l3.5-3.5"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </button>
    </div>

    <!-- 下：暗号文字列ボックス -->
    <section class="field">
      <label class="field-label" id="label-bottom" for="box-bottom">暗号文字列</label>
      <textarea
        id="box-bottom"
        class="text-box"
        rows="10"
        spellcheck="false"
        placeholder=""
      ></textarea>
    </section>

    <!-- 変換ボタン -->
    <div class="convert-row">
      <button id="convert-btn" class="convert-btn" type="button" title="変換" aria-label="変換">
        <svg viewBox="0 0 24 24" width="40" height="40" aria-hidden="true">
          <path
            d="M4 8h13M17 8l-4-4M17 8l-4 4M20 16H7M7 16l4-4M7 16l4 4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="convert-label">変換</span>
      </button>
    </div>

    <p id="convert-error" class="convert-error" role="alert" aria-live="polite"></p>

    <!-- アコーディオン：変換可能文字一覧 -->
    <section class="accordion">
      <details>
        <summary class="accordion-title">変換可能文字一覧</summary>
        <div class="accordion-body" id="char-table">
          <p class="accordion-placeholder">（読み込み中…）</p>
        </div>
      </details>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
